name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.1"
        required: true
        type: string
      release_notes:
        description: "Release notes shown on GitHub and in the in-app updater (Markdown supported)"
        required: true
        type: string
      draft:
        description: "Create the GitHub Release as a draft. Draft releases are not visible to the in-app updater."
        required: true
        default: false
        type: boolean
      run_tests:
        description: "Run lint and tests before packaging"
        required: true
        default: false
        type: boolean

run-name: Windows Release ${{ inputs.version }}

permissions:
  contents: write

concurrency:
  group: windows-release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  build:
    name: Build Windows installer
    runs-on: windows-latest
    timeout-minutes: 120

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        env:
          KEYDEX_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          $version = "${{ inputs.version }}".Trim()
          if ($version.StartsWith("v", [System.StringComparison]::OrdinalIgnoreCase)) {
            $version = $version.Substring(1)
          }
          if ($version -notmatch '^\d+\.\d+\.\d+([\-+][0-9A-Za-z.-]+)?$') {
            throw "Invalid release version '${{ inputs.version }}'. Use SemVer such as 0.1.1 or 0.1.1-beta.1."
          }
          if ([string]::IsNullOrWhiteSpace($env:KEYDEX_RELEASE_NOTES)) {
            throw "Release notes must not be empty."
          }

          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "INSTALLER_NAME=Keydex_${version}_x64-setup.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "UPDATER_SIGNATURE_NAME=Keydex_${version}_x64-setup.exe.sig" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Set package version
        run: .\scripts\set-release-version.ps1 -Version $env:RELEASE_VERSION

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Create Python virtual environment
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip uv
          "VIRTUAL_ENV=$((Resolve-Path .\.venv).Path)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$((Resolve-Path .\.venv\Scripts).Path)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: desktop/pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target

      - name: Build Windows package
        env:
          KEYDEX_RELEASE_NOTES: ${{ inputs.release_notes }}
          TAURI_CONFIG: '{"bundle":{"createUpdaterArtifacts":true}}'
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:TAURI_SIGNING_PRIVATE_KEY)) {
            throw "Missing GitHub secret TAURI_SIGNING_PRIVATE_KEY. Add the updater private key before running this release workflow."
          }
          $args = @(
            "-ExecutionPolicy", "Bypass",
            "-File", ".\scripts\package-windows.ps1",
            "-Full",
            "-Sign",
            "-RustJobs", "2",
            "-TestWorkers", "2"
          )
          if ("${{ inputs.run_tests }}" -ne "true") {
            $args += "-SkipTests"
          }
          & powershell.exe @args
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: keydex-windows-${{ env.RELEASE_VERSION }}
          retention-days: 14
          path: |
            artifacts/windows/${{ env.INSTALLER_NAME }}
            artifacts/windows/${{ env.UPDATER_SIGNATURE_NAME }}
            artifacts/windows/latest.json
            artifacts/windows/manifest.json
            artifacts/windows/README.txt

      - name: Create or verify release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags origin

          $tagExists = $false
          git rev-parse -q --verify "refs/tags/$env:RELEASE_TAG"
          if ($LASTEXITCODE -eq 0) {
            $tagExists = $true
          }

          if ($tagExists) {
            $tagCommit = git rev-list -n 1 $env:RELEASE_TAG
            $headCommit = git rev-parse HEAD
            if ($tagCommit -ne $headCommit) {
              throw "Release tag $env:RELEASE_TAG already points to $tagCommit, not current commit $headCommit."
            }
            Write-Host "Release tag $env:RELEASE_TAG already exists on this commit."
          } else {
            git tag $env:RELEASE_TAG
            git push origin $env:RELEASE_TAG
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Keydex ${{ env.RELEASE_VERSION }}
          draft: ${{ inputs.draft }}
          prerelease: false
          fail_on_unmatched_files: true
          files: |
            artifacts/windows/${{ env.INSTALLER_NAME }}
            artifacts/windows/${{ env.UPDATER_SIGNATURE_NAME }}
            artifacts/windows/latest.json
            artifacts/windows/manifest.json
            artifacts/windows/README.txt
          body: |
            ${{ inputs.release_notes }}

            Built from commit ${{ github.sha }}.
