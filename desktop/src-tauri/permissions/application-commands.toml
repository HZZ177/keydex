[[permission]]
identifier = "allow-main-application-commands"
description = "Allows the trusted main webview to use the existing Keydex application commands."
commands.allow = [
  "resolve_dev_agent_connection",
  "allocate_port",
  "start_sidecar",
  "stop_sidecar",
  "wait_for_health",
  "hide_main_window",
  "request_app_exit",
  "open_path_in_file_manager",
  "read_text_file",
  "write_text_file",
  "copy_file_to_clipboard",
  "take_associated_file_open_paths",
  "relaunch_after_app_update",
  "browser_create_surface",
  "browser_destroy_surface",
  "browser_navigate",
  "browser_go_back",
  "browser_go_forward",
  "browser_reload",
  "browser_stop",
  "browser_find",
  "browser_stop_find",
  "browser_start_selection",
  "browser_configure_overlay",
  "browser_cancel_selection",
  "browser_resolve_annotations",
  "browser_render_highlights",
  "browser_clear_highlights",
  "browser_navigate_to_annotation_target",
  "browser_capture_region",
  "browser_discard_capture",
  "browser_take_incognito_capture",
  "browser_set_zoom",
  "browser_set_resource_state",
  "browser_set_bounds",
  "browser_set_visibility",
  "browser_clear_profile_data",
  "browser_respond_permission",
  "browser_respond_download",
  "terminal_list_profiles",
  "terminal_create",
  "terminal_list",
  "terminal_attach",
  "terminal_ack",
  "terminal_detach",
  "terminal_write",
  "terminal_resize",
  "terminal_kill",
  "terminal_rename",
  "terminal_close",
  "terminal_close_session",
  "terminal_close_all",
]

[[permission]]
identifier = "allow-browser-page-bridge-message"
description = "Allows a managed browser webview to submit authenticated structured-annotation bridge messages."
commands.allow = ["browser_page_bridge_message"]
